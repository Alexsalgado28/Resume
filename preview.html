<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Salgado</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom,#020617,#111827,#1f2937);
  color:#e5e7eb;
}

.container {
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.card {
  background:#111827;
  border:1px solid #374151;
  border-radius:18px;
  padding:20px;
  transition:.3s;
  cursor:pointer;
}

.card:hover {
  transform:translateY(-5px);
  box-shadow:0 10px 25px rgba(0,0,0,.4);
}

.card.active {
  border:2px solid white;
  transform:translateY(-5px) scale(1.02);
}

.grid {
  display:grid;
  gap:20px;
}

@media(min-width:900px){
  .grid-2 {
    grid-template-columns:1fr 1fr;
  }
}

button {
  padding:8px 14px;
  border-radius:10px;
  border:1px solid #374151;
  background:#1f2937;
  color:white;
  cursor:pointer;
}

button.active {
  background:white;
  color:black;
}

.hover:hover {
  background:rgba(255,255,255,.08);
  border-radius:6px;
}

.qr {
  width:150px;
  background:white;
  padding:8px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<div style="text-align:right">
  <button onclick="setLang('es')">ES</button>
  <button onclick="setLang('en')" class="active">EN</button>
</div>

<h1 id="name"></h1>
<p id="headline"></p>

<div class="grid grid-2">

<div class="card" onclick="activate(this)">
  <h2 id="profileTitle"></h2>
  <p id="profileText"></p>
</div>

<div class="card" onclick="activate(this)">
  <h2 id="skillsTitle"></h2>
  <div id="skills"></div>
</div>

<div class="card" onclick="activate(this)">
  <h2 id="educationTitle"></h2>
  <div id="education"></div>
</div>

<div class="card" onclick="activate(this)">
  <h2 id="languagesTitle"></h2>
  <p id="languages"></p>
</div>

<div class="card" onclick="activate(this)">
  <h2 id="valuesTitle"></h2>
  <p id="values"></p>
</div>

<div class="card" onclick="activate(this)">
  <h2 id="knowledgeTitle"></h2>
  <div id="knowledge"></div>
</div>

<div class="card" onclick="activate(this)">
  <h2 id="coursesTitle"></h2>
  <a href="https://drive.google.com/drive/folders/1Ex8AdPU3FkBr8rG9VbUiI1QaNkbTb4Qa" target="_blank">
    <img src="qr.png" class="qr">
  </a>
</div>

<div class="card" onclick="activate(this)">
  <h2 id="experienceTitle"></h2>
  <div id="jobs"></div>
</div>

</div>

</div>

<script>
const data = {
  en:{
    name:"Alejandro Salgado",
    headline:"I focus on delivering clear, useful, and measurable results.",
    profileTitle:"Professional profile",
    profileText:"Professional with experience in project management, quality operations, and process analysis.",
    skillsTitle:"Skills",
    skills:["Leadership","Communication","Project management","Data analysis"],
    educationTitle:"Education",
    education:[
      "International Business · UABC (2021-2025)",
      "Biotechnology · UABC (2018-2020)",
      "HR Technician · CBTIS 40"
    ],
    languagesTitle:"Languages",
    languages:"Spanish / English",
    valuesTitle:"Values",
    values:"Justice · Intensity · Perseverance",
    knowledgeTitle:"Other knowledge",
    knowledge:["ServiceNow","Workday","Jira","ISO","Agile"],
    coursesTitle:"Courses & Certifications",
    experienceTitle:"Experience",
    jobs:[
      "IT Project Manager - Thermo Fisher",
      "HR Analyst - Thermo Fisher"
    ]
  },
  es:{
    name:"Alejandro Salgado",
    headline:"Me enfoco en resultados claros y medibles.",
    profileTitle:"Perfil profesional",
    profileText:"Experiencia en proyectos, calidad y procesos.",
    skillsTitle:"Habilidades",
    skills:["Liderazgo","Comunicación","Gestión de proyectos"],
    educationTitle:"Educación",
    education:[
      "Negocios Internacionales · UABC",
      "Biotecnología · UABC",
      "Técnico RH · CBTIS 40"
    ],
    languagesTitle:"Idiomas",
    languages:"Español / Inglés",
    valuesTitle:"Valores",
    values:"Justicia · Intensidad · Perseverancia",
    knowledgeTitle:"Otros conocimientos",
    knowledge:["ServiceNow","Workday","Jira","ISO","Agile"],
    coursesTitle:"Cursos",
    experienceTitle:"Experiencia",
    jobs:[
      "IT Project Manager",
      "HR Analyst"
    ]
  }
};

let lang="en";

function render(){
  const t=data[lang];

  document.getElementById("name").innerText=t.name;
  document.getElementById("headline").innerText=t.headline;
  document.getElementById("profileTitle").innerText=t.profileTitle;
  document.getElementById("profileText").innerText=t.profileText;
  document.getElementById("skillsTitle").innerText=t.skillsTitle;
  document.getElementById("skills").innerHTML=t.skills.map(s=>`<span class="hover">${s}</span>`).join("<br>");
  document.getElementById("educationTitle").innerText=t.educationTitle;
  document.getElementById("education").innerHTML=t.education.join("<br>");
  document.getElementById("languagesTitle").innerText=t.languagesTitle;
  document.getElementById("languages").innerText=t.languages;
  document.getElementById("valuesTitle").innerText=t.valuesTitle;
  document.getElementById("values").innerText=t.values;
  document.getElementById("knowledgeTitle").innerText=t.knowledgeTitle;
  document.getElementById("knowledge").innerHTML=t.knowledge.join("<br>");
  document.getElementById("coursesTitle").innerText=t.coursesTitle;
  document.getElementById("experienceTitle").innerText=t.experienceTitle;
  document.getElementById("jobs").innerHTML=t.jobs.join("<br>");
}

function setLang(l){
  lang=l;
  render();
}

function activate(el){
  document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");
}

render();
</script>

</body>
</html>
